<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>FastFasts Player</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;overflow:hidden;background:#000;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
    video{width:100%;height:100%;object-fit:contain}
    #overlay{position:absolute;bottom:0;left:0;right:0;padding:12px 16px;background:linear-gradient(transparent,rgba(0,0,0,.8));opacity:1;transition:opacity .3s}
    #overlay.hidden{opacity:0}
    #channelName{font-size:14px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
    #nowPlaying{font-size:12px;opacity:.8;margin-top:2px}
    #error{display:none;position:absolute;inset:0;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px}
    #error.show{display:flex}
    #error h2{font-size:18px;margin-bottom:8px}
    #error p{font-size:13px;opacity:.6}
  </style>
</head>
<body>
  <video id="video" autoplay muted playsinline></video>
  <div id="adContainer" style="position:absolute;top:0;left:0;width:100%;height:100%;display:none;z-index:100;"></div>
  <div id="overlay">
    <div id="channelName"></div>
    <div id="nowPlaying"></div>
  </div>
  <div id="error">
    <h2>Channel Unavailable</h2>
    <p>This channel is not currently broadcasting.</p>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script src="//imasdk.googleapis.com/js/sdkloader/ima3.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    let workerUrl = params.get('worker') || '';
// Strip any m3u8 path that may have been included
workerUrl = workerUrl.replace(/\/(index|live)\.m3u8$/, '');
    const channelName = params.get('name') || 'FastFasts';
    const autoplay = params.get('autoplay') !== 'false';
    const muted = params.get('muted') !== 'false';
    const controls = params.get('controls') === 'true';
    const adsEnabled = params.get('adsEnabled') === 'true';
    const preRollUrl = params.get('preRollUrl') || '';
    const midRollUrl = params.get('midRollUrl') || '';
    const useFallback = params.get('useFallback') === 'true';
    const forceFrequency = parseInt(params.get('forceFrequency') || '0');
    const houseAds = JSON.parse(params.get('houseAds') || '[]');
    let breakCounter = 0;

    const video = document.getElementById('video');
    const overlay = document.getElementById('overlay');
    const errorEl = document.getElementById('error');
    const adContainer = document.getElementById('adContainer');

    video.muted = muted;
    video.controls = controls;
    document.getElementById('channelName').textContent = channelName;

    // IMA SDK
    let adsManager, adsLoader, adDisplayContainer;
    function initializeIMA() {
      adDisplayContainer = new google.ima.AdDisplayContainer(adContainer, video);
      adsLoader = new google.ima.AdsLoader(adDisplayContainer);
      adsLoader.addEventListener(google.ima.AdsManagerLoadedEvent.Type.ADS_MANAGER_LOADED, onAdsManagerLoaded, false);
      adsLoader.addEventListener(google.ima.AdErrorEvent.Type.AD_ERROR, onAdError, false);
    }
    function requestAds(vastUrl) {
      if (!vastUrl) return;
      adDisplayContainer.initialize();
      const adsRequest = new google.ima.AdsRequest();
      adsRequest.adTagUrl = vastUrl;
      adsRequest.linearAdSlotWidth = video.clientWidth;
      adsRequest.linearAdSlotHeight = video.clientHeight;
      adsLoader.requestAds(adsRequest);
    }
    function onAdsManagerLoaded(adsManagerLoadedEvent) {
      const adsRenderingSettings = new google.ima.AdsRenderingSettings();
      adsRenderingSettings.restoreCustomPlaybackStateOnAdBreakComplete = true;
      adsManager = adsManagerLoadedEvent.getAdsManager(video, adsRenderingSettings);
      adsManager.addEventListener(google.ima.AdErrorEvent.Type.AD_ERROR, onAdError);
      adsManager.addEventListener(google.ima.AdEvent.Type.CONTENT_PAUSE_REQUESTED, () => {
        video.pause();
        adContainer.style.display = 'block';
      });
      adsManager.addEventListener(google.ima.AdEvent.Type.CONTENT_RESUME_REQUESTED, () => {
        adContainer.style.display = 'none';
        video.play().catch(() => {});
      });
      adsManager.addEventListener(google.ima.AdEvent.Type.ALL_ADS_COMPLETED, () => {
        adContainer.style.display = 'none';
        video.play().catch(() => {});
      });
      try {
        adsManager.init(video.clientWidth, video.clientHeight, google.ima.ViewMode.NORMAL);
        adsManager.start();
      } catch (e) {
        console.error('AdsManager start error', e);
        video.play().catch(() => {});
      }
    }
    function onAdError(adErrorEvent) {
      console.error('IMA error', adErrorEvent.getError());
      if (adsManager) adsManager.destroy();
      adContainer.style.display = 'none';
      if (useFallback && houseAds.length > 0) {
        playHouseAd();
      } else {
        video.play().catch(() => {});
      }
    }

    function playHouseAd() {
      if (houseAds.length === 0) return;
      // Weighted random
      const totalWeight = houseAds.reduce((sum, ad) => sum + ad.weight, 0);
      let random = Math.random() * totalWeight;
      let selectedAd = houseAds[0];
      for (const ad of houseAds) {
        if (random < ad.weight) {
          selectedAd = ad;
          break;
        }
        random -= ad.weight;
      }

      video.pause();
      const adVideo = document.createElement('video');
      adVideo.src = selectedAd.url;
      adVideo.style.position = 'absolute';
      adVideo.style.top = '0';
      adVideo.style.left = '0';
      adVideo.style.width = '100%';
      adVideo.style.height = '100%';
      adVideo.style.zIndex = '200';
      adVideo.autoplay = true;
      adVideo.muted = muted;
      adContainer.appendChild(adVideo);
      adContainer.style.display = 'block';
      adVideo.play().catch(() => {});
      adVideo.addEventListener('ended', () => {
        adContainer.removeChild(adVideo);
        adContainer.style.display = 'none';
        video.play().catch(() => {});
      });
    }

    if (adsEnabled) initializeIMA();

    if (!workerUrl) {
      errorEl.classList.add('show');
      errorEl.querySelector('p').textContent = 'No worker URL provided.';
    } else {
      const hlsUrl = workerUrl.replace(/\/$/, '') + '/index.m3u8';
      const nowUrl = workerUrl.replace(/\/$/, '') + '/now.json';

      const servedBreaks = new Set();

      if (Hls.isSupported()) {
        const hls = new Hls({
          liveSyncDurationCount: 3,
          liveMaxLatencyDurationCount: 6,
          enableWorker: true,
        });
        hls.loadSource(hlsUrl);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, () => {
          if (adsEnabled && preRollUrl) {
            requestAds(preRollUrl);
          } else if (autoplay) {
            video.play().catch(() => {});
          }
        });
        hls.on(Hls.Events.LEVEL_UPDATED, (_, data) => {
          if (!midRollUrl || !adsEnabled) return;
          const dateRanges = data.details?.dateRanges;
          if (!dateRanges) return;
          for (const dr of Object.values(dateRanges)) {
            if (dr.id?.startsWith('ad-break-') && !servedBreaks.has(dr.id)) {
              servedBreaks.add(dr.id);
              console.log('Mid-roll triggered for break:', dr.id);
              breakCounter++;
              if (forceFrequency > 0 && breakCounter % forceFrequency === 0) {
                playHouseAd();
              } else {
                requestAds(midRollUrl);
              }
            }
          }
        });
        hls.on(Hls.Events.ERROR, (e, data) => {
          if (data.fatal) {
            if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
              // Recoverable — try to resume without showing error
              setTimeout(() => hls.startLoad(), 3000);
            } else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
              // Recoverable — let HLS.js try to fix the media
              hls.recoverMediaError();
            } else {
              // Truly unrecoverable
              errorEl.classList.add('show');
            }
          }
        });

        // Hide error overlay as soon as a fragment successfully loads
        hls.on(Hls.Events.FRAG_LOADED, () => {
          errorEl.classList.remove('show');
        });
      } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = hlsUrl;
        video.addEventListener('loadedmetadata', () => {
          if (autoplay) video.play().catch(() => {});
        });
      } else {
        errorEl.classList.add('show');
        errorEl.querySelector('p').textContent = 'HLS not supported in this browser.';
      }

      // Fetch now playing info
      function updateNow() {
        fetch(nowUrl).then(r => r.json()).then(data => {
          const np = data.now || data;
          const artist = np.artist || np.artistName || '';
          const title = np.title || np.songTitle || '';
          document.getElementById('nowPlaying').textContent = 
            artist && title ? artist + ' — ' + title : title || '';
        }).catch(() => {});
      }
      updateNow();
      setInterval(updateNow, 15000);

      // Auto-hide overlay
      let hideTimer;
      function showOverlay() {
        overlay.classList.remove('hidden');
        clearTimeout(hideTimer);
        hideTimer = setTimeout(() => overlay.classList.add('hidden'), 4000);
      }
      video.addEventListener('mousemove', showOverlay);
      video.addEventListener('touchstart', showOverlay);
      setTimeout(() => overlay.classList.add('hidden'), 5000);
    }
  </script>
</body>
</html>
